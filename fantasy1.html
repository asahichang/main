<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Викторина: Фэнтези для писателей</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f4f0;
    color: #1a1a18;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .container { max-width: 640px; width: 100%; }
  h1 {
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 0.35rem;
    color: #1a1a18;
  }
  .subtitle {
    font-size: 14px;
    color: #888780;
    margin-bottom: 1.75rem;
  }
  .q-card {
    background: #fff;
    border: 0.5px solid rgba(0,0,0,0.12);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
  }
  .q-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.25rem;
  }
  .q-counter { font-size: 13px; color: #888780; }
  .dots-row { display: flex; gap: 5px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #d3d1c7; }
  .dot.correct { background: #639922; }
  .dot.wrong { background: #E24B4A; }
  .q-progress { height: 3px; background: #f1efe8; border-radius: 2px; margin-bottom: 1.5rem; overflow: hidden; }
  .q-progress-fill { height: 100%; background: #7F77DD; border-radius: 2px; transition: width 0.4s ease; }
  .q-category {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #7F77DD;
    margin-bottom: 0.5rem;
  }
  .q-text { font-size: 15px; line-height: 1.55; margin-bottom: 1.25rem; color: #1a1a18; }
  .q-options { display: flex; flex-direction: column; gap: 8px; }
  .q-option {
    padding: 10px 14px;
    border: 0.5px solid rgba(0,0,0,0.2);
    border-radius: 8px;
    font-size: 14px;
    color: #1a1a18;
    cursor: pointer;
    background: transparent;
    text-align: left;
    line-height: 1.45;
    transition: background 0.15s, border-color 0.15s;
    font-family: inherit;
  }
  .q-option:hover:not(:disabled) { background: #f5f4f0; border-color: rgba(0,0,0,0.35); }
  .q-option.correct { background: #EAF3DE; border-color: #639922; color: #3B6D11; }
  .q-option.wrong { background: #FCEBEB; border-color: #E24B4A; color: #A32D2D; }
  .q-option.reveal { background: #EAF3DE; border-color: #639922; color: #3B6D11; }
  .q-option:disabled { cursor: default; }
  .q-explain {
    margin-top: 1rem;
    padding: 10px 14px;
    background: #f5f4f0;
    border-radius: 8px;
    font-size: 13px;
    color: #5f5e5a;
    line-height: 1.6;
    border-left: 2px solid #7F77DD;
    display: none;
  }
  .q-next {
    margin-top: 1.25rem;
    padding: 9px 20px;
    border: 0.5px solid rgba(0,0,0,0.2);
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    background: transparent;
    color: #1a1a18;
    display: none;
    font-family: inherit;
    transition: background 0.15s;
  }
  .q-next:hover { background: #f5f4f0; }
  .result-card {
    background: #fff;
    border: 0.5px solid rgba(0,0,0,0.12);
    border-radius: 12px;
    padding: 2.5rem 2rem;
    text-align: center;
  }
  .result-score { font-size: 52px; font-weight: 500; color: #1a1a18; margin-bottom: 0.25rem; }
  .result-label { font-size: 15px; color: #888780; margin-bottom: 1.25rem; }
  .result-grid { display: grid; gap: 5px; max-width: 260px; margin: 0 auto 1.5rem; }
  .result-dot { width: 100%; aspect-ratio: 1; border-radius: 4px; }
  .result-comment { font-size: 14px; color: #5f5e5a; line-height: 1.65; max-width: 400px; margin: 0 auto 1.75rem; }
  .restart-btn {
    padding: 9px 24px;
    border: 0.5px solid rgba(0,0,0,0.2);
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    background: transparent;
    color: #1a1a18;
    font-family: inherit;
    transition: background 0.15s;
  }
  .restart-btn:hover { background: #f5f4f0; }
</style>
</head>
<body>
<div class="container">
  <h1>Фэнтези для писателей</h1>
  <p class="subtitle">10 вопросов о жанре, авторах и нарративных механиках</p>
  <div id="quiz-main"></div>
</div>

<script>
const questions = [
  {
    category: "Толкин и основы жанра",
    q: "Толкин ввёл термин «эвкатастрофа» для описания ключевого момента в фэнтези. Что он имел в виду?",
    opts: [
      "Трагическую гибель главного героя в финале",
      "Внезапный счастливый поворот, нарушающий логику трагедии",
      "Финальную битву добра со злом",
      "Возвращение героя домой после путешествия"
    ],
    correct: 1,
    explain: "В эссе «О волшебных сказках» (1947) Толкин описал эвкатастрофу как «внезапный поворот к счастью» — момент, который не отрицает существование горя и неудачи, но пронизывает их неожиданной радостью. Он считал это определяющей характеристикой жанра."
  },
  {
    category: "Урсула Ле Гуин",
    q: "В «Волшебнике Земноморья» Ле Гуин строит систему магии на принципе, нетипичном для фэнтези того времени. На чём она основана?",
    opts: [
      "На крови и жертвоприношениях",
      "На знании истинных имён вещей",
      "На физическом истощении мага",
      "На договорах с духами стихий"
    ],
    correct: 1,
    explain: "Магия Земноморья держится на «языке созидания» — истинном языке, которым боги создали мир. Знать истинное имя вещи или существа значит иметь власть над ним. Этот принцип связал магическую систему с темой ответственности за слова — центральной в книгах Ле Гуин."
  },
  {
    category: "Нарративные приёмы",
    q: "Джордж Мартин описывал двух типов писателей: «садовников» и «архитекторов». Какое определение он давал садовникам?",
    opts: [
      "Те, кто пишет длинные описания природы",
      "Те, кто сажает семена и смотрит, что вырастет",
      "Те, кто создаёт детальные карты мира до начала написания",
      "Те, кто работает медленно, но тщательно"
    ],
    correct: 1,
    explain: "По Мартину, «садовники» создают персонажей и ситуации, а потом следят за тем, куда история ведёт их сама. «Архитекторы» же сначала строят детальный план. Сам Мартин считал себя садовником — отсюда неожиданные смерти и повороты в «Песни Льда и Огня»."
  },
  {
    category: "Сэндерсон и системы магии",
    q: "Первый закон Сэндерсона гласит: «Способность героя решить проблему с помощью магии прямо пропорциональна тому...»",
    opts: [
      "...насколько давно читатель знает о существовании этой магии",
      "...сколько страниц посвящено описанию магической системы",
      "...насколько дорогую цену герой заплатил за магию",
      "...насколько магия связана с эмоциями героя"
    ],
    correct: 0,
    explain: "Первый закон Сэндерсона: «Возможность автора использовать магию для решения проблем зависит от того, насколько хорошо читатель понимает эту магию». Это объясняет, почему в «Мисте» или «Пути королей» магия строго описана заранее — иначе финальное решение ощущается как deus ex machina."
  },
  {
    category: "Классика жанра",
    q: "В романе «Имя ветра» Патрика Ротфусса весь сюжет подаётся как рассказ героя о себе самом в таверне. Какую нарративную проблему это создаёт — и на которую Ротфусс намеренно опирается?",
    opts: [
      "Читатель не может верить герою, потому что тот хвастун",
      "Мы знаем, что герой выживет, что снимает часть напряжения",
      "Слишком много флэшбэков замедляют темп",
      "Герой не может рассказывать о событиях, при которых не присутствовал"
    ],
    correct: 1,
    explain: "Ротфусс сознательно использует «ненадёжного рассказчика» и «знаем-что-выживет» как инструменты. Напряжение создаётся не вопросом «умрёт ли он?», а «каким образом он стал тем сломленным человеком, которого мы видим в таверне?» — это перенос драматического вопроса с выживания на деградацию."
  },
  {
    category: "Терри Пратчетт",
    q: "Пратчетт говорил, что сатира — это не то, что делает его книги комедиями. Что, по его словам, является настоящим двигателем Плоского мира?",
    opts: [
      "Пародия на клише классического фэнтези",
      "Гнев — за несправедливость, глупость и жестокость",
      "Любовь к читателям, которых он хотел рассмешить",
      "Философские вопросы, которые он не мог задать серьёзно"
    ],
    correct: 1,
    explain: "Пратчетт неоднократно повторял: «Люди думают, что я пишу смешные книги. Но смех — это просто то, что происходит, когда я злюсь». Плоский мир держится на подлинном возмущении — расизмом, властью, тупостью систем. Смех был для него оружием, а не целью."
  },
  {
    category: "Строительство мира",
    q: "Ле Гуин в эссе «Создание мира без веса» критиковала определённый подход к вторичным мирам. Что она считала главной ошибкой начинающих авторов фэнтези?",
    opts: [
      "Слишком мало карт и географических деталей",
      "Создавать мир как декорацию, а не как систему со своей логикой",
      "Избегать тёмных тем и насилия",
      "Копировать средневековую Европу вместо придумывания нового"
    ],
    correct: 1,
    explain: "Ле Гуин настаивала: мир должен быть «обитаем» — иметь внутреннюю логику, экономику, экологию, язык. Когда мир существует только как фон для приключений, он рассыпается при первом же вопросе «а откуда берётся еда для армии?». Мир должен думать сам."
  },
  {
    category: "Субверсия тропов",
    q: "«Убийца короля» Ротфусса и «Имя ветра» часто называют деконструкцией «избранного героя». В чём состоит ключевой деконструктивный приём?",
    opts: [
      "Герой оказывается злодеем в конце",
      "Легенда о герое существует внутри книги, и мы видим расстояние между мифом и реальностью",
      "У героя нет магических способностей",
      "Героем оказывается второстепенный персонаж"
    ],
    correct: 1,
    explain: "Квоут — персонаж, о котором уже ходят легенды в момент рассказа. Мы одновременно видим его эпические поступки и слышим, как он сам опровергает половину мифов о себе. Ротфусс исследует, как из обычных событий создаются легенды — и насколько опасен человек, которого мир превратил в символ."
  },
  {
    category: "Тёмное фэнтези",
    q: "«Кровь и железо» Джо Аберкромби открыла «гримдарк» как поджанр. Какой нарративный принцип Аберкромби формулировал как центральный для своих книг?",
    opts: [
      "Герои должны страдать, чтобы читатель им сочувствовал",
      "Нет хороших людей на войне — только разные оттенки плохого",
      "Реалистичное насилие должно иметь психологические последствия",
      "Мораль не существует, есть только власть"
    ],
    correct: 2,
    explain: "Аберкромби говорил, что его раздражало фэнтези, где герои убивают сотни людей и идут дальше без последствий. Его центральный вопрос — что война и насилие делают с людьми психологически. Отсюда Логен Девятипалец, Занд дан Глокта — персонажи, несущие шрамы всего пережитого."
  },
  {
    category: "Архетипы и структура",
    q: "Кэмпбелловский «мономиф» (путь героя) активно критикуется в современном литературном фэнтези. Что чаще всего называют его главным структурным ограничением для сложных произведений?",
    opts: [
      "Слишком много этапов — читатель теряется",
      "Схема предполагает одного центрального героя и линейное возвращение",
      "Нет места для романтических линий",
      "Схема придумана для устного эпоса и плохо работает в тексте"
    ],
    correct: 1,
    explain: "Главная критика: мономиф оптимизирован под одного героя-мужчину, который уходит, меняется и возвращается «обновлённым». Он плохо описывает ансамблевые нарративы (Мартин), нелинейные структуры (Вулф, Ле Гуин) и истории, где «возвращения» нет или оно невозможно. Многие авторы работают именно против этой схемы."
  }
];

let current = 0, score = 0, answered = false;
let answers = new Array(questions.length).fill(null);

function render() {
  const container = document.getElementById('quiz-main');
  if (current >= questions.length) { renderResult(container); return; }
  const q = questions[current];
  const pct = (current / questions.length) * 100;
  const dotsHtml = questions.map((_, i) => {
    let cls = 'dot';
    if (answers[i] === true) cls += ' correct';
    else if (answers[i] === false) cls += ' wrong';
    return `<span class="${cls}"></span>`;
  }).join('');

  container.innerHTML = `
    <div class="q-card">
      <div class="q-header">
        <span class="q-counter">Вопрос ${current + 1} из ${questions.length}</span>
        <div class="dots-row">${dotsHtml}</div>
      </div>
      <div class="q-progress"><div class="q-progress-fill" style="width:${pct}%"></div></div>
      <div class="q-category">${q.category}</div>
      <div class="q-text">${q.q}</div>
      <div class="q-options">
        ${q.opts.map((opt, i) => `<button class="q-option" data-i="${i}">${opt}</button>`).join('')}
      </div>
      <div id="explain" class="q-explain"></div>
      <button class="q-next" id="next-btn">${current < questions.length - 1 ? 'Следующий вопрос →' : 'Посмотреть результат →'}</button>
    </div>`;

  document.querySelectorAll('.q-option').forEach(btn => {
    btn.addEventListener('click', function() {
      if (answered) return;
      answered = true;
      const chosen = parseInt(this.dataset.i);
      document.querySelectorAll('.q-option').forEach((b, i) => {
        b.disabled = true;
        if (i === q.correct) b.classList.add('reveal');
        else if (i === chosen && chosen !== q.correct) b.classList.add('wrong');
      });
      answers[current] = (chosen === q.correct);
      if (chosen === q.correct) score++;
      const exp = document.getElementById('explain');
      exp.style.display = 'block';
      exp.textContent = q.explain;
      document.getElementById('next-btn').style.display = 'inline-block';
    });
  });

  document.getElementById('next-btn').addEventListener('click', () => {
    current++; answered = false; render();
  });
}

function renderResult(container) {
  const pct = Math.round((score / questions.length) * 100);
  const labels = ['Terra incognita', 'Terra incognita', 'Любитель с потенциалом', 'Любитель с потенциалом', 'Любитель с потенциалом', 'Опытный читатель', 'Опытный читатель', 'Опытный читатель', 'Мастер жанра', 'Мастер жанра', 'Мастер жанра'];
  const comments = {
    'Мастер жанра': 'Вы не просто читаете фэнтези — вы думаете о нём как писатель. Отличное знание и классики, и современных авторов, и нарративных механик.',
    'Опытный читатель': 'Крепкая база. Вы явно много читали и думали о том, как устроены хорошие книги. Несколько слепых пятен — отличный повод углубиться.',
    'Любитель с потенциалом': 'Хорошее начало. Жанр огромен, и некоторые вопросы касались специфических авторских теорий. Эссе Ле Гуин и интервью Сэндерсона — отличное следующее чтение.',
    'Terra incognita': 'Жанровая теория — это отдельная дисциплина, и она интереснее, чем кажется. Эти вопросы — хорошая карта того, что стоит исследовать дальше.'
  };
  const label = labels[score];
  const gridHtml = answers.map(a => `<div class="result-dot" style="background:${a ? '#639922' : '#E24B4A'}"></div>`).join('');

  container.innerHTML = `
    <div class="result-card">
      <div class="result-score">${score}/${questions.length}</div>
      <div class="result-label">${label}</div>
      <div class="result-grid" style="grid-template-columns:repeat(${questions.length},1fr)">${gridHtml}</div>
      <div class="result-comment">${comments[label]}</div>
      <button class="restart-btn" id="restart">Пройти снова</button>
    </div>`;

  document.getElementById('restart').addEventListener('click', () => {
    current = 0; score = 0; answered = false;
    answers = new Array(questions.length).fill(null);
    render();
  });
}

render();
</script>
</body>
</html>
